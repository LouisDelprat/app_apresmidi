name: Build iOS IPA

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Récupération du code
      uses: actions/checkout@v4

    - name: Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Installation des dépendances de compilation
      run: |
        brew install autoconf automake libtool pkg-config
        brew link libtool
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Compilation iOS avec Buildozer
      run: |
        buildozer ios debug

    - name: Création du fichier IPA pour Sideloadly
      run: |
        mkdir Payload
        # Buildozer génère un fichier .app dans ce dossier caché, on le copie
        cp -R .buildozer/ios/platform/kivy-ios/conciergerie-ios/build/Release-iphoneos/*.app Payload/
        # On le zip et on change l'extension en .ipa
        zip -r Conciergerie.ipa Payload

    - name: Mise à disposition du fichier IPA
      uses: actions/upload-artifact@v4
      with:
        name: Conciergerie-App-iOS
        path: Conciergerie.ipa